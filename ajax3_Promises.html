<!DOCTYPE html>
<html>
<body>
<div id="demo">
    <h1>Consumo de API com Promises (XMLHttpRequest)</h1>
    <input type="text" name="cep" id="cep" placeholder="Digite seu CEP">
    <button type="button" onclick="handleSearch()">Pesquisar CEP</button>
    <br>
    <input type="text" id="logradouro" placeholder="Logradouro">
    <br>
    <input type="text" id="complemento" placeholder="Complemento">
    <br>
    <input type="text" id="bairro" placeholder="Bairro">
    <br>
    <input type="text" id="localidade" placeholder="Cidade">
    <br>
    <input type="text" id="uf" placeholder="UF">
</div>

<script>
// Função que encapsula o XMLHttpRequest em uma Promise
function getCEP(cep) {
  return new Promise((resolve, reject) => {
    const xhttp = new XMLHttpRequest();
    xhttp.open("GET", "https://viacep.com.br/ws/" + cep + "/json", true);
    
    xhttp.onload = () => {
      if (xhttp.status === 200) {
        resolve(JSON.parse(xhttp.responseText));
      } else {
        reject("Erro na requisição: " + xhttp.status);
      }
    };
    
    xhttp.onerror = () => reject("Erro de rede");
    xhttp.send();
  });
}

// Função que consome a Promise
function handleSearch() {
  const cep = document.getElementById("cep").value;
  
  getCEP(cep)
    .then(endereco => {
      document.getElementById("logradouro").value = endereco.logradouro || "";
      document.getElementById("complemento").value = endereco.complemento || "";
      document.getElementById("bairro").value = endereco.bairro || "";
      document.getElementById("localidade").value = endereco.localidade || "";
      document.getElementById("uf").value = endereco.uf || "";
    })
    .catch(error => {
      console.error(error);
      alert("Não foi possível buscar o endereço.");
    });
}
</script>
</body>
</html>
